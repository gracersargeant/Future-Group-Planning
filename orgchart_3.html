<style>
:root{
  --navy:#0a1e35;--blue:#1e6fb5;--accent:#2589d4;--accent2:#4aaee8;
  --bg:#eef3f8;--card:#fff;--border:#ccdded;--text:#0d2340;--dim:#7a96b0;
  --green:#276749;--amber:#d97706;--purple:#553c9a;--radius:8px;
  --shadow:0 2px 12px rgba(15,42,74,.1);--shadow-lg:0 8px 32px rgba(15,42,74,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--navy);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.35)}
.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-sq{width:38px;height:38px;border-radius:7px;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;color:#fff}
.logo-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:17px;color:#fff}
.logo-name span{color:var(--accent2)}
.back-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:6px 16px;font-size:13px;color:rgba(255,255,255,.7);text-decoration:none;transition:.2s}
.back-btn:hover{background:rgba(255,255,255,.15);color:#fff}

/* HERO */
.hero{background:linear-gradient(110deg,#0a1e35,#0f2a4a 40%,#1a4a7a 80%,#1e6fb5);padding:36px 40px 32px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;right:-60px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(74,174,232,.13) 0%,transparent 65%);pointer-events:none}
.hero-inner{position:relative;z-index:1}
.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:10px}
.bc a{color:rgba(255,255,255,.4);text-decoration:none}.bc a:hover{color:rgba(255,255,255,.8)}
.hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:6px}
.hero p{font-size:13px;color:rgba(255,255,255,.55)}

/* TABS */
.tab-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 40px;display:flex;overflow-x:auto;gap:0;flex-shrink:0}
.tab-bar::-webkit-scrollbar{height:3px}.tab-bar::-webkit-scrollbar-thumb{background:var(--border)}
.tab-btn{padding:13px 16px;font-size:12.5px;font-weight:600;color:var(--dim);border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:.15s}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
main{flex:1;padding:32px 40px 60px}
.panel{display:none}.panel.active{display:block;animation:fadeUp .25s ease}
.dept-hdr{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.dept-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dept-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--text)}
.dept-sub{font-size:12px;color:var(--dim);margin-top:2px}

/* CHART WRAPPER */
.chart-wrap{overflow-x:auto;padding-bottom:20px}
.chart-svg-wrap{display:inline-block;min-width:100%;position:relative}

/* NODE CARDS — rendered as foreignObject or as HTML positioned divs */
.node{position:absolute;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center;cursor:pointer;transition:all .18s;box-shadow:var(--shadow)}
.node:hover{border-color:var(--accent);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.node.top{border-color:var(--accent);border-width:2px;background:#e8f4fd}
.node.dashed{border-style:dashed;border-color:var(--accent2)}
.node .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:#fff;margin:0 auto 6px}
.node .nm{font-family:'Plus Jakarta Sans',sans-serif;font-size:11.5px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px}
.node .rl{font-size:10px;color:var(--dim);line-height:1.35}
.node .nt{font-size:9.5px;color:var(--accent);font-style:italic;margin-top:3px}

/* CONTACT MODAL */
.overlay{position:fixed;inset:0;background:rgba(10,30,53,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex;animation:fadeIn .18s ease}
.modal{background:var(--card);border-radius:14px;padding:0;width:100%;max-width:400px;box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .2s ease}
.modal-head{background:linear-gradient(110deg,var(--navy),var(--blue));padding:24px;display:flex;align-items:center;gap:16px}
.modal-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:#fff;flex-shrink:0;border:3px solid rgba(255,255,255,.25)}
.modal-nm{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;color:#fff;margin-bottom:3px}
.modal-rl{font-size:12.5px;color:rgba(255,255,255,.65)}
.modal-body{padding:20px 24px 24px}
.contact-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.contact-row:last-child{border-bottom:none}
.contact-icon{width:34px;height:34px;border-radius:8px;background:#e8f4fd;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.contact-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.contact-val{font-size:13.5px;color:var(--text);font-weight:500}
.contact-val a{color:var(--accent);text-decoration:none}.contact-val a:hover{text-decoration:underline}
.modal-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.modal-close:hover{background:rgba(255,255,255,.25)}
.modal-head{position:relative}

/* LEGEND */
.legend{display:flex;gap:20px;flex-wrap:wrap;margin-top:20px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--dim)}
.leg-line{width:26px;height:2px}.leg-solid{background:var(--border)}.leg-dash{background:repeating-linear-gradient(to right,var(--accent2) 0,var(--accent2) 4px,transparent 4px,transparent 8px)}
.leg-box{width:16px;height:16px;border-radius:3px;border:2px solid var(--accent);background:#e8f4fd}
.leg-dbox{width:16px;height:16px;border-radius:3px;border:2px dashed var(--accent2);background:var(--card)}

/* FOOTER */
footer{background:var(--navy);border-top:3px solid var(--blue);padding:22px 40px}
.foot-in{max-width:1360px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,.28)}
.foot-in a{color:rgba(255,255,255,.45);text-decoration:none}.foot-in a:hover{color:var(--accent2)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){header,main,footer,.hero,.tab-bar{padding-left:16px;padding-right:16px}}
</style>

function ini(n){return n.split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase()}

function openCard(id,name,role,color){
  const c=CONTACTS[id]||{};
  document.getElementById('mav').textContent=ini(name);
  document.getElementById('mav').style.background=color;
  document.getElementById('mnm').textContent=name;
  document.getElementById('mrl').textContent=role;
  const rows=[
    {icon:'📍',label:'Site / Location',val:c.site||'Not provided'},
    {icon:'📞',label:'Phone',val:c.phone?`<a href="tel:${c.phone}">${c.phone}</a>`:'Not provided'},
    {icon:'✉️',label:'Email',val:c.email?`<a href="mailto:${c.email}">${c.email}</a>`:'Not provided'},
  ];
  document.getElementById('mbody').innerHTML=rows.map(r=>`
    <div class="contact-row">
      <div class="contact-icon">${r.icon}</div>
      <div><div class="contact-label">${r.label}</div><div class="contact-val">${r.val}</div></div>
    </div>`).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay')||e.currentTarget.classList.contains('modal-close'))
    document.getElementById('overlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════
//  CHART BUILDER — renders nodes + SVG lines
//  Each dept defines a tree of nodes with x,y,w,h positions
//  relative to a canvas, plus edges between them.
// ═══════════════════════════════════════════════════════════════

// Node dimensions
const NW=148, NH=72, NW_WIDE=160, NH_TALL=82;

function makeNode(id,name,role,color,x,y,opts={}){
  return {id,name,role,color,x,y,w:opts.w||NW,h:opts.h||NH,top:!!opts.top,dashed:!!opts.dashed,note:opts.note||''};
}

function edge(from,to,dashed=false){return{from,to,dashed}}

function renderChart(nodes,edges,canvasW,canvasH){
  // Build node map
  const nm={};nodes.forEach(n=>nm[n.id]=n);
  // SVG lines
  let lines='';
  edges.forEach(e=>{
    const a=nm[e.from],b=nm[e.to];
    if(!a||!b)return;
    const ax=a.x+a.w/2, ay=a.y+a.h;
    const bx=b.x+b.w/2, by=b.y;
    const my=(ay+by)/2;
    const stroke=e.dashed?`stroke="#4aaee8" stroke-dasharray="6,4"`:`stroke="#ccdded"`;
    lines+=`<path d="M${ax},${ay} L${ax},${my} L${bx},${my} L${bx},${by}" fill="none" ${stroke} stroke-width="2"/>`;
  });
  // Node divs
  const divs=nodes.map(n=>{
    const cls=['node',n.top?'top':'',n.dashed?'dashed':''].filter(Boolean).join(' ');
    return `<div class="${cls}" style="left:${n.x}px;top:${n.y}px;width:${n.w}px;min-height:${n.h}px"
      onclick="openCard('${n.id}','${n.name.replace(/'/g,"\\'")}','${n.role.replace(/'/g,"\\'")}','${n.color}')">
      <div class="av" style="background:${n.color}">${ini(n.name)}</div>
      <div class="nm">${n.name}</div>
      <div class="rl">${n.role}</div>
      ${n.note?`<div class="nt">${n.note}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="chart-svg-wrap" style="position:relative;width:${canvasW}px;height:${canvasH}px">
    <svg style="position:absolute;top:0;left:0;width:${canvasW}px;height:${canvasH}px;overflow:visible" xmlns="http://www.w3.org/2000/svg">${lines}</svg>
    ${divs}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  BUILD TABS + PANELS
// ═══════════════════════════════════════════════════════════════
const tabBar=document.getElementById('tabBar');
const mainEl=document.getElementById('main');

DEPTS.forEach((dept,i)=>{
  const btn=document.createElement('button');
  btn.className='tab-btn'+(i===0?' active':'');
  btn.innerHTML=dept.icon+' '+dept.label;
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('p-'+dept.id).classList.add('active');
  };
  tabBar.appendChild(btn);

  const panel=document.createElement('div');
  panel.className='panel'+(i===0?' active':'');
  panel.id='p-'+dept.id;

  const legend=`<div class="legend">
    <div class="leg-item"><div class="leg-box"></div> Top / primary node</div>
    <div class="leg-item"><div class="leg-line leg-solid"></div> Primary reporting line</div>
    <div class="leg-item"><div class="leg-line leg-dash"></div> Secondary / multi-reporting line</div>
    <div class="leg-item"><div class="leg-dbox"></div> Secondary reporting node</div>
    <div class="leg-item" style="color:#888;font-size:11px">&#128432; Click any card to view contact details</div>
  </div>`;

  panel.innerHTML=`
    <div class="dept-hdr">
      <div class="dept-icon" style="background:${dept.iconBg}">${dept.icon}</div>
      <div><div class="dept-title">${dept.label}</div><div class="dept-sub">Click any card to view contact details</div></div>
    </div>
    <div class="chart-wrap">${dept.render()}</div>
    ${legend}`;
  mainEl.appendChild(panel);
});
</script>
