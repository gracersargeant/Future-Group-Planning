<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organisation Chart | Sargeant Transport Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0f2a4a;--navy-dark:#0a1e35;--blue-mid:#1a4a7a;--blue-bright:#1e6fb5;
      --accent:#2589d4;--accent2:#4aaee8;--accent-pale:#e8f4fd;
      --bg:#eef3f8;--bg-card:#ffffff;--bg-card2:#f5f9fd;
      --border:#ccdded;--text-dark:#0d2340;--text-body:#3a5270;--text-dim:#7a96b0;
      --radius:10px;--shadow:0 2px 10px rgba(15,42,74,0.09);--shadow-md:0 4px 20px rgba(15,42,74,0.13);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-body);min-height:100vh;display:flex;flex-direction:column}
    header{background:var(--navy-dark);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:66px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(10,30,53,0.4)}
    .logo-area{display:flex;align-items:center;gap:13px;text-decoration:none}
    .logo-placeholder{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#4aaee8,#2589d4);display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;color:white;flex-shrink:0}
    .company-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;color:#fff}
    .company-name span{color:#4aaee8}
    .back-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.13);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.7);text-decoration:none;transition:all 0.2s}
    .back-btn:hover{background:rgba(255,255,255,0.14);color:#fff}
    .hero{background:linear-gradient(110deg,#0a1e35 0%,#0f2a4a 40%,#1a4a7a 80%,#1e6fb5 100%);padding:40px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-80px;right:-60px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(74,174,232,0.12) 0%,transparent 65%);pointer-events:none}
    .hero-inner{position:relative;z-index:1}
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:12px}
    .breadcrumb a{color:rgba(255,255,255,0.45);text-decoration:none}
    .breadcrumb a:hover{color:rgba(255,255,255,0.8)}
    .hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:6px}
    .hero p{font-size:14px;color:rgba(255,255,255,0.58)}
    .tab-bar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 40px;display:flex;overflow-x:auto;gap:0}
    .tab-btn{padding:14px 18px;font-size:13px;font-weight:600;color:var(--text-dim);border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'Inter',sans-serif}
    .tab-btn:hover{color:var(--text-dark)}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    main{flex:1;padding:36px 40px 56px;overflow-x:auto}
    .chart-panel{display:none}
    .chart-panel.active{display:block;animation:fadeIn 0.25s ease}
    .dept-title-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
    .dept-icon-big{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .dept-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:var(--text-dark)}
    .dept-sublabel{font-size:13px;color:var(--text-dim);margin-top:2px}
    .tree-scroll{overflow-x:auto;padding-bottom:16px}
    .tree-inner{display:inline-flex;flex-direction:column;align-items:center;min-width:100%;padding:8px 20px}
    .col{display:flex;flex-direction:column;align-items:center}
    .row{display:flex;align-items:flex-start;justify-content:center;gap:16px;position:relative}
    .stem{width:2px;background:var(--border);margin:0 auto}
    .node-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center;width:152px;box-shadow:var(--shadow);transition:box-shadow 0.2s,transform 0.2s;position:relative}
    .node-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
    .node-card.top-card{border-color:var(--accent);border-width:2px;background:var(--accent-pale)}
    .node-card.secondary{border-style:dashed;border-color:var(--accent2)}
    .node-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;color:white;margin:0 auto 8px}
    .node-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;color:var(--text-dark);line-height:1.3;margin-bottom:4px}
    .node-role{font-size:10.5px;color:var(--text-dim);line-height:1.4}
    .node-note{font-size:10px;color:var(--accent);font-style:italic;margin-top:4px}
    .legend{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:16px}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
    .legend-line{width:28px;height:2px}
    .legend-line.solid{background:var(--border)}
    .legend-line.dashed{background:repeating-linear-gradient(to right,#4aaee8 0,#4aaee8 4px,transparent 4px,transparent 8px)}
    .secondary-box{background:var(--bg-card);border:1.5px dashed var(--accent2);border-radius:var(--radius);padding:14px 16px;text-align:center;width:165px}
    footer{background:var(--navy-dark);border-top:3px solid #1e6fb5;padding:24px 40px}
    .footer-inner{max-width:1360px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,0.28)}
    .footer-inner a{color:rgba(255,255,255,0.45);text-decoration:none}
    .footer-inner a:hover{color:#4aaee8}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<header>
  <a class="logo-area" href="index.html">
    <div class="logo-placeholder">ST</div>
    <div class="company-name">Sargeant <span>Transport Services</span></div>
  </a>
  <a class="back-btn" href="index.html">&#8592; Back to Staff Portal</a>
</header>
<div class="hero">
  <div class="hero-inner">
    <div class="breadcrumb"><a href="index.html">Staff Portal</a><span style="margin:0 4px">&#8250;</span><span style="color:rgba(255,255,255,0.75)">Organisation Chart</span></div>
    <h1>&#127970; Organisation Chart</h1>
    <p>Select a department tab to view it's structure. Dashed borders indicate secondary reporting lines.</p>
  </div>
</div>
<div class="tab-bar" id="tabBar"></div>
<main id="main"></main>
<footer>
  <div class="footer-inner">
    <span>&#169; 2026 Sargeant Transport Services. All rights reserved.</span>
    <a href="index.html">&#8592; Back to Staff Portal</a>
  </div>
</footer>
<script>
const C={navy:'#0f2a4a',blue:'#1e6fb5',mid:'#2589d4',light:'#4aaee8',green:'#276749',amber:'#d97706',purple:'#553c9a',teal:'#0f766e',slate:'#475569'};
function ini(n){return n.split(' ').filter(Boolean).map(w=>w[0]).join('').substring(0,2).toUpperCase()}
function stem(h=28){return `<div class="stem" style="height:${h}px"></div>`}
function card(name,role,color,isTop=false,isDashed=false,note=''){
  return `<div class="node-card${isTop?' top-card':''}${isDashed?' secondary':''}">
    <div class="node-avatar" style="background:${color}">${ini(name)}</div>
    <div class="node-name">${name}</div>
    <div class="node-role">${role}</div>
    ${note?`<div class="node-note">${note}</div>`:''}
  </div>`
}
function col(...c){return `<div class="col">${c.join('')}</div>`}
function row(...c){return `<div class="row">${c.join('')}</div>`}
function secbox(name,role,color,note){
  return `<div class="secondary-box">
    <div class="node-avatar" style="background:${color};margin:0 auto 8px;width:38px;height:38px;font-size:13px">${ini(name)}</div>
    <div class="node-name">${name}</div><div class="node-role">${role}</div>
    ${note?`<div class="node-note">${note}</div>`:''}
  </div>`
}

const DEPTS=[

{id:'fleet-management',label:'Fleet Management',icon:'&#128663;',iconBg:'#ede9fe',render(){

];

const tabBar=document.getElementById('tabBar');
const mainEl=document.getElementById('main');
DEPTS.forEach((dept,i)=>{
  const btn=document.createElement('button');
  btn.className='tab-btn'+(i===0?' active':'');
  btn.innerHTML=dept.icon+' '+dept.label;
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.chart-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+dept.id).classList.add('active');
  };
  tabBar.appendChild(btn);
  const panel=document.createElement('div');
  panel.className='chart-panel'+(i===0?' active':'');
  panel.id='panel-'+dept.id;
  panel.innerHTML=`
    <div class="dept-title-row">
      <div class="dept-icon-big" style="background:${dept.iconBg}">${dept.icon}</div>
      <div><div class="dept-label">${dept.label}</div><div class="dept-sublabel">Click the tabs above to switch departments</div></div>
    </div>
    <div class="tree-scroll">${dept.render()}</div>`;
  mainEl.appendChild(panel);
});
</script>
</body>
</html>
