<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organisation Chart | Sargeant Transport Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:        #0f2a4a;
      --navy-dark:   #0a1e35;
      --blue-mid:    #1a4a7a;
      --blue-bright: #1e6fb5;
      --accent:      #2589d4;
      --accent2:     #4aaee8;
      --accent-pale: #e8f4fd;
      --bg:          #eef3f8;
      --bg-card:     #ffffff;
      --bg-card2:    #f5f9fd;
      --border:      #ccdded;
      --text-dark:   #0d2340;
      --text-body:   #3a5270;
      --text-dim:    #7a96b0;
      --white:       #ffffff;
      --radius:      12px;
      --shadow:      0 2px 12px rgba(15,42,74,0.09);
      --shadow-md:   0 6px 24px rgba(15,42,74,0.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--navy-dark);
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 66px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(10,30,53,0.4);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 13px;
      text-decoration: none;
    }

    .logo-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
    }

    .company-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #ffffff;
    }

    .company-name span { color: var(--accent2); }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

    .hero {
      background: linear-gradient(110deg, var(--navy-dark) 0%, var(--navy) 40%, var(--blue-mid) 80%, var(--blue-bright) 100%);
      padding: 44px 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -60px;
      width: 380px; height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74,174,232,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-inner { position: relative; z-index: 1; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
    }

    .breadcrumb a { color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: rgba(255,255,255,0.8); }
    .breadcrumb span { color: rgba(255,255,255,0.75); }

    .hero h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .hero p { font-size: 14px; color: rgba(255,255,255,0.58); }

    main {
      flex: 1;
      padding: 40px 48px 56px;
      max-width: 1360px;
      width: 100%;
      margin: 0 auto;
    }

    /* BREADCRUMB TRAIL */
    .trail-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .trail-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .trail-item button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .trail-item button:hover {
      background: var(--accent-pale);
      border-color: var(--accent);
    }

    .trail-item.current button {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      cursor: default;
    }

    .trail-sep { color: var(--border); font-size: 16px; }

    /* TOP NODE */
    .top-node {
      text-align: center;
      margin-bottom: 12px;
    }

    .node-box {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 16px 28px;
      border-radius: var(--radius);
      border: 2px solid var(--accent);
      background: var(--accent);
      color: white;
      min-width: 200px;
    }

    .node-box .node-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .node-box .node-sub {
      font-size: 12px;
      opacity: 0.8;
    }

    /* CONNECTOR LINE DOWN */
    .connector-down {
      width: 2px;
      height: 32px;
      background: var(--border);
      margin: 0 auto;
    }

    /* HORIZONTAL LINE ACROSS CHILDREN */
    .children-wrap {
      position: relative;
    }

    .children-line {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 2px;
      background: var(--border);
    }

    /* CHILDREN GRID */
    .children-grid {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      padding-top: 32px;
    }

    /* CHILD ITEM */
    .child-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.3s ease both;
    }

    .child-item:nth-child(1) { animation-delay: 0.03s; }
    .child-item:nth-child(2) { animation-delay: 0.06s; }
    .child-item:nth-child(3) { animation-delay: 0.09s; }
    .child-item:nth-child(4) { animation-delay: 0.12s; }
    .child-item:nth-child(5) { animation-delay: 0.15s; }
    .child-item:nth-child(6) { animation-delay: 0.18s; }

    .child-connector {
      width: 2px;
      height: 32px;
      background: var(--border);
    }

    /* DEPT CARD (top level clickable) */
    .dept-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px 22px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      min-width: 160px;
      max-width: 200px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .dept-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      transition: opacity 0.2s;
      opacity: 0;
    }

    .dept-card:hover {
      border-color: var(--accent);
      background: var(--accent-pale);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .dept-card:hover::before { opacity: 1; }

    .dept-card .dept-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .dept-card .dept-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .dept-card .dept-count {
      font-size: 11px;
      color: var(--text-dim);
    }

    .dept-card .drill-hint {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .dept-card:hover .drill-hint { opacity: 1; }

    /* PERSON CARD */
    .person-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 18px 20px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      min-width: 150px;
      max-width: 180px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }

    .person-card:hover {
      border-color: var(--border);
      box-shadow: var(--shadow-md);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: white;
      flex-shrink: 0;
    }

    .person-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .person-role {
      font-size: 11.5px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    /* DEPT HEADER (when drilled in) */
    .dept-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .dept-header-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .dept-header-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text-dark);
    }

    .dept-header-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* EDIT HINT */
    .edit-hint {
      text-align: center;
      margin-top: 48px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text-dim);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .edit-hint code {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 12px;
      font-family: monospace;
      color: var(--accent);
    }

    footer {
      background: var(--navy-dark);
      border-top: 3px solid var(--blue-bright);
      padding: 24px 48px;
    }

    .footer-inner {
      max-width: 1360px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
    }

    .footer-inner a { color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; }
    .footer-inner a:hover { color: var(--accent2); }

    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .hero { padding: 32px 20px 28px; }
      main { padding: 28px 20px 40px; }
      footer { padding: 20px; }
      .children-grid { gap: 14px; }
      .dept-card { min-width: 130px; padding: 16px 14px; }
      .person-card { min-width: 130px; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #chart-area { animation: fadeIn 0.25s ease; }
  </style>
</head>
<body>

<header>
  <a class="logo-area" href="index.html">
    <div class="logo-placeholder">ST</div>
    <div class="company-name">Sargeant <span>Transport Services</span></div>
  </a>
  <a class="back-btn" href="index.html">← Back to Staff Portal</a>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="breadcrumb">
      <a href="index.html">Staff Portal</a>
      <span>›</span>
      <span>Organisation Chart</span>
    </div>
    <h1>🏢 Organisation Chart</h1>
    <p>Click a department to explore it's structure and team members.</p>
  </div>
</div>

<main>
  <div id="trail-wrap" class="trail-wrap"></div>
  <div id="chart-area"></div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <span>© 2026 Sargeant Transport Services. All rights reserved.</span>
    <a href="index.html">← Back to Staff Portal</a>
  </div>
</footer>

<script>
/*
==========================================================
  EDIT YOUR ORG CHART HERE
  ─────────────────────────────────────────────────────
  Structure:
  {
    id: 'unique-id',
    name: 'Person or Department Name',
    role: 'Job Title or Description',       ← shown on person cards
    icon: '🚛',                              ← emoji for dept cards
    color: '#hex',                           ← avatar/icon background
    children: [ ... ]                        ← nested people or sub-depts
  }

  Tips:
  - Add as many children as you like
  - Nest children inside children for deeper levels
  - Set icon + color on department nodes
  - Set role on person nodes (no icon needed)
  - Leave children: [] for leaf nodes (no drill-down)
==========================================================
*/

const ORG_DATA = {
  id: 'root',
  name: 'Sargeant Transport',
  role: 'All Staff',
  children: [
    {
  id: 'operations',
  name: 'Operations',
  icon: '🚛',
  color: '#1e6fb5',
  children: [
     {
      id: 'operations',
      name: 'Operations',
      icon: '🚛',
      color: '#1e6fb5',
      children: [
        { id: 'ops-mgr',    name: 'Operations Manager', role: 'Head of Operations',   color: '#1e6fb5', children: [] },
        { id: 'fleet-mgr',  name: 'Fleet Manager',      role: 'Fleet & Vehicles',     color: '#2589d4', children: [] },
        { id: 'driver-1',   name: 'Driver Coordinator', role: 'Driver Scheduling',    color: '#4aaee8', children: [] },
        { id: 'driver-2',   name: 'Driver',             role: 'Transport Driver',     color: '#4aaee8', children: [] },
        { id: 'driver-3',   name: 'Driver',             role: 'Transport Driver',     color: '#4aaee8', children: [] },
      ]
    },
    {
      id: 'maintenance',
      name: 'Maintenance',
      icon: '🔧',
      color: '#276749',
      children: [
        { id: 'maint-mgr',  name: 'Maintenance Manager', role: 'Head of Maintenance', color: '#276749', children: [] },
        { id: 'mech-1',     name: 'Mechanic',            role: 'Workshop Technician', color: '#38a169', children: [] },
        { id: 'mech-2',     name: 'Mechanic',            role: 'Workshop Technician', color: '#38a169', children: [] },
      ]
    },
    {
      id: 'safety',
      name: 'Safety & WHS',
      icon: '⚠️',
      color: '#d97706',
      children: [
        { id: 'safety-mgr', name: 'Safety Manager',      role: 'WHS &amp; Compliance', color: '#d97706', children: [] },
        { id: 'safety-off', name: 'Safety Officer',      role: 'Site Safety',          color: '#f59e0b', children: [] },
      ]
    },
    {
      id: 'hr',
      name: 'HR',
      icon: '👥',
      color: '#553c9a',
      children: [
        { id: 'hr-mgr',     name: 'HR Manager',          role: 'Human Resources',     color: '#553c9a', children: [] },
        { id: 'hr-coord',   name: 'HR Coordinator',      role: 'Recruitment & Admin', color: '#7c5cbf', children: [] },
      ]
    },
    {
      id: 'admin',
      name: 'Administration',
      icon: '📋',
      color: '#2b6cb0',
      children: [
        { id: 'admin-mgr',  name: 'Office Manager',      role: 'Administration',      color: '#2b6cb0', children: [] },
        { id: 'admin-1',    name: 'Administrator',       role: 'Finance & Admin',     color: '#4299e1', children: [] },
      ]
    },
    {
      id: 'it',
      name: 'IT',
      icon: '💻',
      color: '#0f2a4a',
      children: [
        { id: 'it-mgr',     name: 'IT Manager',          role: 'Systems & Support',   color: '#0f2a4a', children: [] },
      ]
    },
  ]
};

/* ── RENDERING ── */

let currentPath = []; // stack of node objects

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

function findNode(id, node) {
  if (node.id === id) return node;
  for (const child of (node.children || [])) {
    const found = findNode(id, child);
    if (found) return found;
  }
  return null;
}

function renderTrail() {
  const wrap = document.getElementById('trail-wrap');
  const full = [ORG_DATA, ...currentPath];
  wrap.innerHTML = full.map((node, i) => {
    const isCurrent = i === full.length - 1;
    return `<div class="trail-item ${isCurrent ? 'current' : ''}">
      ${i > 0 ? '<span class="trail-sep">›</span>' : ''}
      <button onclick="goToDepth(${i})">${node.name}</button>
    </div>`;
  }).join('');
}

function goToDepth(depth) {
  if (depth === 0) {
    currentPath = [];
  } else {
    currentPath = currentPath.slice(0, depth);
  }
  render();
}

function drillInto(id) {
  const node = findNode(id, ORG_DATA);
  if (node && node.children && node.children.length > 0) {
    currentPath.push(node);
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function render() {
  renderTrail();
  const area = document.getElementById('chart-area');
  const currentNode = currentPath.length > 0 ? currentPath[currentPath.length - 1] : ORG_DATA;

  // Top node box
  let html = `<div class="top-node">
    <div class="node-box">
      <div class="node-title">${currentNode.name}</div>
      ${currentNode.role ? `<div class="node-sub">${currentNode.role}</div>` : ''}
    </div>
  </div>
  <div class="connector-down"></div>`;

  const children = currentNode.children || [];

  if (children.length === 0) {
    html += `<p style="text-align:center; color:var(--text-dim); font-size:14px; margin-top:24px;">No further structure defined.</p>`;
  } else {
    html += `<div class="children-wrap"><div class="children-grid">`;

    children.forEach(child => {
      const hasDrilldown = child.children && child.children.length > 0;
      const isDept = !!child.icon; // departments have icons, people don't

      html += `<div class="child-item">
        <div class="child-connector"></div>`;

      if (isDept) {
        // Department card — clickable
        html += `<div class="dept-card" onclick="drillInto('${child.id}')" title="Click to explore ${child.name}">
          <div class="dept-icon" style="background:${child.color}20; color:${child.color}">${child.icon}</div>
          <div class="dept-name">${child.name}</div>
          <div class="dept-count">${child.children.length} member${child.children.length !== 1 ? 's' : ''}</div>
          ${hasDrilldown ? `<div class="drill-hint">Click to expand →</div>` : ''}
        </div>`;
      } else {
        // Person card
        html += `<div class="person-card">
          <div class="avatar" style="background:${child.color || '#2589d4'}">${getInitials(child.name)}</div>
          <div class="person-name">${child.name}</div>
          <div class="person-role">${child.role || ''}</div>
        </div>`;
      }

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  area.innerHTML = html;
  area.style.animation = 'none';
  area.offsetHeight; // force reflow
  area.style.animation = 'fadeIn 0.25s ease';
}

render();
</script>

</body>
</html>
